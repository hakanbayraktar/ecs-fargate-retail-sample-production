name: deploy-services

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service to deploy
        required: true
        type: choice
        options:
          - catalog
          - cart
          - checkout
          - orders

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve service metadata
        run: |
          case "${{ inputs.service }}" in
            catalog)
              echo "SERVICE_NAME=${{ vars.ECS_CATALOG_SERVICE_NAME }}" >> "$GITHUB_ENV"
              echo "TASK_DEFINITION_FAMILY=${{ vars.ECS_CATALOG_TASK_DEFINITION_FAMILY }}" >> "$GITHUB_ENV"
              echo "ECR_REPOSITORY=${{ vars.ECR_CATALOG_REPOSITORY }}" >> "$GITHUB_ENV"
              echo "CONTAINER_NAME=catalog" >> "$GITHUB_ENV"
              echo "BUILD_CONTEXT=app/upstream/retail-store-sample-app/src/catalog" >> "$GITHUB_ENV"
              ;;
            cart)
              echo "SERVICE_NAME=${{ vars.ECS_CART_SERVICE_NAME }}" >> "$GITHUB_ENV"
              echo "TASK_DEFINITION_FAMILY=${{ vars.ECS_CART_TASK_DEFINITION_FAMILY }}" >> "$GITHUB_ENV"
              echo "ECR_REPOSITORY=${{ vars.ECR_CART_REPOSITORY }}" >> "$GITHUB_ENV"
              echo "CONTAINER_NAME=cart" >> "$GITHUB_ENV"
              echo "BUILD_CONTEXT=app/upstream/retail-store-sample-app/src/cart" >> "$GITHUB_ENV"
              ;;
            checkout)
              echo "SERVICE_NAME=${{ vars.ECS_CHECKOUT_SERVICE_NAME }}" >> "$GITHUB_ENV"
              echo "TASK_DEFINITION_FAMILY=${{ vars.ECS_CHECKOUT_TASK_DEFINITION_FAMILY }}" >> "$GITHUB_ENV"
              echo "ECR_REPOSITORY=${{ vars.ECR_CHECKOUT_REPOSITORY }}" >> "$GITHUB_ENV"
              echo "CONTAINER_NAME=checkout" >> "$GITHUB_ENV"
              echo "BUILD_CONTEXT=app/upstream/retail-store-sample-app/src/checkout" >> "$GITHUB_ENV"
              ;;
            orders)
              echo "SERVICE_NAME=${{ vars.ECS_ORDERS_SERVICE_NAME }}" >> "$GITHUB_ENV"
              echo "TASK_DEFINITION_FAMILY=${{ vars.ECS_ORDERS_TASK_DEFINITION_FAMILY }}" >> "$GITHUB_ENV"
              echo "ECR_REPOSITORY=${{ vars.ECR_ORDERS_REPOSITORY }}" >> "$GITHUB_ENV"
              echo "CONTAINER_NAME=orders" >> "$GITHUB_ENV"
              echo "BUILD_CONTEXT=app/upstream/retail-store-sample-app/src/orders" >> "$GITHUB_ENV"
              ;;
            *)
              echo "unsupported service"
              exit 1
              ;;
          esac

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Validate zero-downtime ECS settings
        run: |
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "$SERVICE_NAME" \
            --output json > service.json

          desired_count="$(jq -r '.services[0].desiredCount' service.json)"
          min_healthy="$(jq -r '.services[0].deploymentConfiguration.minimumHealthyPercent' service.json)"
          max_percent="$(jq -r '.services[0].deploymentConfiguration.maximumPercent' service.json)"
          circuit_enabled="$(jq -r '.services[0].deploymentConfiguration.deploymentCircuitBreaker.enable' service.json)"
          rollback_enabled="$(jq -r '.services[0].deploymentConfiguration.deploymentCircuitBreaker.rollback' service.json)"
          previous_task_definition="$(jq -r '.services[0].taskDefinition' service.json)"

          echo "PREVIOUS_TASK_DEFINITION=$previous_task_definition" >> "$GITHUB_ENV"

          test "$desired_count" -ge 2
          test "$min_healthy" -ge 100
          test "$max_percent" -ge 200
          test "$circuit_enabled" = "true"
          test "$rollback_enabled" = "true"

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" "$BUILD_CONTEXT"
          docker push "$ECR_REPOSITORY:$IMAGE_TAG"
          echo "IMAGE_URI=$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Fetch current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$TASK_DEFINITION_FAMILY" \
            --query 'taskDefinition' \
            --output json > task-definition.json

      - name: Render new task definition
        run: |
          jq --arg IMAGE_URI "$IMAGE_URI" --arg CONTAINER_NAME "$CONTAINER_NAME" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions |= map(
                if .name == $CONTAINER_NAME then .image = $IMAGE_URI else . end
              )
          ' task-definition.json > task-definition-rendered.json

      - name: Register task definition revision
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://task-definition-rendered.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text > new-task-definition-arn.txt
          echo "NEW_TASK_DEFINITION=$(cat new-task-definition-arn.txt)" >> "$GITHUB_ENV"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --task-definition "$NEW_TASK_DEFINITION"

      - name: Wait for service stability
        run: aws ecs wait services-stable --cluster "$ECS_CLUSTER_NAME" --services "$SERVICE_NAME"

      - name: Roll back to previous task definition on failed deployment
        if: failure()
        run: |
          if [[ -n "${PREVIOUS_TASK_DEFINITION:-}" ]]; then
            aws ecs update-service \
              --cluster "$ECS_CLUSTER_NAME" \
              --service "$SERVICE_NAME" \
              --task-definition "$PREVIOUS_TASK_DEFINITION"
          fi

