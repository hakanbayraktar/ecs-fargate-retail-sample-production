name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        run: terraform fmt -check -recursive

  build-selected-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - ui
          - catalog
          - cart
          - checkout
    steps:
      - uses: actions/checkout@v4
      - name: Build upstream service image
        run: docker build -t retail-${{ matrix.service }}:${{ github.sha }} app/upstream/retail-store-sample-app/src/${{ matrix.service }}

