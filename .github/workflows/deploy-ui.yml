name: deploy-ui

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
  push:
    branches:
      - main
    paths:
      - app/upstream/retail-store-sample-app/src/ui/**
      - .github/workflows/deploy-ui.yml

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-ui-${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'dev' }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
      ECS_SERVICE_NAME: ${{ vars.ECS_UI_SERVICE_NAME }}
      ECS_TASK_DEFINITION_FAMILY: ${{ vars.ECS_UI_TASK_DEFINITION_FAMILY }}
      ECR_REPOSITORY: ${{ vars.ECR_UI_REPOSITORY }}
      CONTAINER_NAME: ui
      BUILD_CONTEXT: app/upstream/retail-store-sample-app/src/ui
      SMOKE_TEST_URL: ${{ vars.SMOKE_TEST_URL }}
      CATALOG_HEALTHCHECK_URL: ${{ vars.CATALOG_HEALTHCHECK_URL }}
      CART_HEALTHCHECK_URL: ${{ vars.CART_HEALTHCHECK_URL }}
      CHECKOUT_HEALTHCHECK_URL: ${{ vars.CHECKOUT_HEALTHCHECK_URL }}
      ORDERS_HEALTHCHECK_URL: ${{ vars.ORDERS_HEALTHCHECK_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Validate zero-downtime ECS settings
        run: |
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER_NAME" \
            --services "$ECS_SERVICE_NAME" \
            --output json > service.json

          desired_count="$(jq -r '.services[0].desiredCount' service.json)"
          min_healthy="$(jq -r '.services[0].deploymentConfiguration.minimumHealthyPercent' service.json)"
          max_percent="$(jq -r '.services[0].deploymentConfiguration.maximumPercent' service.json)"
          circuit_enabled="$(jq -r '.services[0].deploymentConfiguration.deploymentCircuitBreaker.enable' service.json)"
          rollback_enabled="$(jq -r '.services[0].deploymentConfiguration.deploymentCircuitBreaker.rollback' service.json)"
          previous_task_definition="$(jq -r '.services[0].taskDefinition' service.json)"

          echo "PREVIOUS_TASK_DEFINITION=$previous_task_definition" >> "$GITHUB_ENV"

          test "$desired_count" -ge 2
          test "$min_healthy" -ge 100
          test "$max_percent" -ge 200
          test "$circuit_enabled" = "true"
          test "$rollback_enabled" = "true"

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REPOSITORY:$IMAGE_TAG" "$BUILD_CONTEXT"
          docker push "$ECR_REPOSITORY:$IMAGE_TAG"
          echo "IMAGE_URI=$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Fetch current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_DEFINITION_FAMILY" \
            --query 'taskDefinition' \
            --output json > task-definition.json

      - name: Render new task definition
        run: |
          jq --arg IMAGE_URI "$IMAGE_URI" --arg CONTAINER_NAME "$CONTAINER_NAME" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions |= map(
                if .name == $CONTAINER_NAME then .image = $IMAGE_URI else . end
              )
          ' task-definition.json > task-definition-rendered.json

      - name: Register task definition revision
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://task-definition-rendered.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text > new-task-definition-arn.txt
          echo "NEW_TASK_DEFINITION=$(cat new-task-definition-arn.txt)" >> "$GITHUB_ENV"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER_NAME" \
            --service "$ECS_SERVICE_NAME" \
            --task-definition "$NEW_TASK_DEFINITION"

      - name: Wait for service stability
        run: aws ecs wait services-stable --cluster "$ECS_CLUSTER_NAME" --services "$ECS_SERVICE_NAME"

      - name: Run smoke test
        run: bash scripts/smoke-test.sh "$SMOKE_TEST_URL" ui-backends

      - name: Roll back to previous task definition on smoke failure
        if: failure()
        run: |
          if [[ -n "${PREVIOUS_TASK_DEFINITION:-}" ]]; then
            aws ecs update-service \
              --cluster "$ECS_CLUSTER_NAME" \
              --service "$ECS_SERVICE_NAME" \
              --task-definition "$PREVIOUS_TASK_DEFINITION"
          fi
