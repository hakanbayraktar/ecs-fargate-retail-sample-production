name: terraform-plan

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to plan
        required: true
        type: choice
        options:
          - dev
          - prod
  pull_request:
    paths:
      - terraform/**
      - app/upstream/retail-store-sample-app/terraform/**

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      TF_ENV: ${{ inputs.environment != '' && inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -recursive
      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false
      - name: Terraform validate
        working-directory: terraform
        run: terraform validate
      - name: Terraform plan
        working-directory: terraform
        run: terraform plan -var-file="envs/${TF_ENV}/${TF_ENV}.tfvars" -lock=false
